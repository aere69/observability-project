groups:
- name: app-alerts
  rules:
  - alert: HighErrorRate
    expr: rate(http_requests_total{status="500"}[1m]) > 1
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "High error rates detected"

  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1m])) > 1
    for: 30s
    labels:
      severity: warning
    annotations:
      summary: "High laency detected"
